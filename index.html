<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#051119">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/HfP6ZSTH/f4f7eb0d-d753-4066-9b9b-4a7a09bab50c-removalai-preview.png">
    
    <title>System Maintenance - CGA Unified Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        /* --- SCREEN & TOUCH PROTECTION CSS --- */
        body {
            -webkit-touch-callout: none; -webkit-user-select: none; -khtml-user-select: none;
            -moz-user-select: none; -ms-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent; /* Removes blue tap highlight on Android */
        }
        img {
            -webkit-user-drag: none; -khtml-user-drag: none; -moz-user-drag: none; -o-user-drag: none; user-drag: none; pointer-events: none;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        /* --- PREMIUM DARK BACKGROUND --- */
        body {
            background-color: #051119;
            background-image: radial-gradient(circle at 50% -20%, #175d85 0%, #051119 80%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            color: #ffffff;
        }

        /* --- GLASSMORPHISM CONTAINER (RESPONSIVE) --- */
        .box-container {
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255,255,255,0.02);
            z-index: 10; 
            width: 100%;
            max-width: 550px;
            padding: 50px 40px;
            text-align: center;
            animation: fadeUp 0.8s ease-out forwards;
        }

        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); } 
        }

        .login-logo { 
            height: clamp(70px, 10vw, 90px); 
            margin-bottom: 20px; 
            object-fit: contain; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); 
        }
        
        /* --- MAINTENANCE HEADER --- */
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid rgba(255, 170, 0, 0.3);
            color: #ffaa00;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        .pulse-dot {
            width: 8px; height: 8px; background-color: #ffaa00;
            border-radius: 50%; margin-right: 8px;
            box-shadow: 0 0 10px #ffaa00;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .box-container h2 { font-size: clamp(20px, 5vw, 26px); margin-bottom: 10px; font-weight: 600; letter-spacing: 0.5px;}
        .box-container p.subtext { color: rgba(255,255,255,0.6); font-size: clamp(13px, 3.5vw, 15px); line-height: 1.6;}

        .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); margin: 30px 0; }

        /* --- PROFESSIONAL GAME UI --- */
        .game-title { font-size: 15px; font-weight: 500; color: #33a1dd; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;}
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(8px, 2vw, 12px);
            width: 100%;
            max-width: 320px;
            margin: 0 auto 25px auto;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(35px, 8vw, 45px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
            touch-action: manipulation; /* Prevents double-tap zoom on Android */
        }

        .cell:hover {
            background: rgba(51, 161, 221, 0.1);
            border-color: rgba(51, 161, 221, 0.4);
        }
        .cell:active { transform: scale(0.95); }

        .status { 
            font-size: clamp(16px, 4vw, 18px); 
            font-weight: 600; 
            margin-bottom: 25px; 
            height: 26px; 
            color: #fff;
            transition: all 0.3s;
        }

        .btn-restart {
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            background: linear-gradient(135deg, #33a1dd, #175d85); color: white; 
            font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 8px 20px rgba(51, 161, 221, 0.3);
            letter-spacing: 0.5px;
        }
        .btn-restart:hover { box-shadow: 0 8px 25px rgba(51, 161, 221, 0.5); transform: translateY(-2px);}
        .btn-restart:active { transform: translateY(1px); box-shadow: 0 4px 10px rgba(51, 161, 221, 0.3);}

        /* --- FOOTER --- */
        .page-footer { position: fixed; bottom: 15px; left: 0; width: 100%; text-align: center; color: rgba(255, 255, 255, 0.3); font-size: 11px; line-height: 1.6; z-index: 5; letter-spacing: 0.5px; }
        .page-footer .creator-name { color: #33a1dd; font-weight: 600; }
        
        /* Utility Colors for X and O */
        .player-x { color: #33a1dd; text-shadow: 0 0 20px rgba(51, 161, 221, 0.7); }
        .player-o { color: #ff4d4d; text-shadow: 0 0 20px rgba(255, 77, 77, 0.7); }
        .win-cell { background: rgba(51, 161, 221, 0.2) !important; border-color: #33a1dd !important; transform: scale(1.05); z-index: 2;}

        /* --- MEDIA QUERIES FOR MOBILE (ANDROID) --- */
        @media (max-width: 480px) {
            .box-container { padding: 40px 20px; border-radius: 20px;}
            body { padding: 15px; align-items: flex-start; padding-top: 5vh;}
            .page-footer { position: relative; bottom: 0; margin-top: 30px; }
        }
    </style>
</head>
<body>

    <!-- MAINTENANCE SCREEN -->
    <div class="box-container">
        <img src="https://i.ibb.co/HfP6ZSTH/f4f7eb0d-d753-4066-9b9b-4a7a09bab50c-removalai-preview.png" alt="Logo" class="login-logo" crossorigin="anonymous">
        
        <div>
            <div class="status-badge"><div class="pulse-dot"></div>Maintenance Mode</div>
        </div>
        
        <h2>System Upgradation</h2>
        <p class="subtext">We are optimizing the CGA Unified Portal servers for a faster and smoother experience. We will be back online shortly.</p>
        
        <div class="divider"></div>

        <div class="game-title">Unwind while you wait</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="status" id="status">Player <span class="player-x">X's</span> Turn</div>

        <button class="btn-restart" onclick="restartGame()">Restart Game</button>
    </div>

    <!-- FOOTER -->
    <div class="page-footer">
        Portal Developed by <span class="creator-name">GOURAB LAYAK</span><br>
        Nexus Infotech Private Limited, Asansol, WB
    </div>

    <script>
        /* --- SCREEN PROTECTION JS --- */
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('dragstart', event => event.preventDefault());   
        document.addEventListener('copy', event => event.preventDefault());        
        document.addEventListener('cut', event => event.preventDefault());         
        document.addEventListener('paste', event => event.preventDefault());       
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i')) {
                e.preventDefault();
            }
        });

        /* --- TIC-TAC-TOE GAME LOGIC --- */
        let boardState = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));

        // Function for Android Haptic Feedback
        function triggerVibration(duration) {
            if (navigator.vibrate) {
                navigator.vibrate(duration);
            }
        }

        function handleCellClick(event) {
            const clickedCell = event.target;
            const cellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (boardState[cellIndex] !== "" || !gameActive) return;

            // Vibrate slightly on tap (Android)
            triggerVibration(40);

            boardState[cellIndex] = currentPlayer;
            clickedCell.innerText = currentPlayer;
            
            // Add Glow Class based on player
            if(currentPlayer === 'X') {
                clickedCell.classList.add('player-x');
            } else {
                clickedCell.classList.add('player-o');
            }

            checkWin();
        }

        function checkWin() {
            let roundWon = false;
            let winningCells = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWon = true;
                    winningCells = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                statusText.innerHTML = `🏆 Player <span class="${currentPlayer === 'X' ? 'player-x' : 'player-o'}">${currentPlayer}</span> Wins!`;
                gameActive = false;
                
                // Highlight winning cells & Vibrate longer
                triggerVibration([100, 50, 100]);
                winningCells.forEach(index => {
                    cells[index].classList.add('win-cell');
                });
                return;
            }

            if (!boardState.includes("")) {
                statusText.innerHTML = "🤝 It's a Draw!";
                gameActive = false;
                triggerVibration(150);
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerHTML = `Player <span class="${currentPlayer === 'X' ? 'player-x' : 'player-o'}">${currentPlayer}'s</span> Turn`;
        }

        function restartGame() {
            triggerVibration(50);
            boardState = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            statusText.innerHTML = `Player <span class="player-x">X's</span> Turn`;
            
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('player-x', 'player-o', 'win-cell');
            });
        }
    </script>
</body>
</html>
