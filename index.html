<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.yourwebsite.com - Page Not Found</title>
    <style>
        body {
            background-color: #ffffff;
            color: #202124;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", sans-serif;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .interstitial-wrapper {
            box-sizing: border-box;
            margin: 12vh auto 0;
            max-width: 600px;
            padding: 0 24px;
            width: 100%;
        }

        .icon-container {
            margin-bottom: 20px;
        }

        h1 {
            color: #202124;
            font-size: 1.6em;
            font-weight: 400;
            margin: 0 0 15px;
            line-height: 1.25;
        }

        p {
            color: #5f6368;
            margin: 0 0 15px;
            font-size: 15px;
            line-height: 1.54;
        }

        .error-code {
            color: #70757a;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .button-container {
            margin-top: 30px;
        }

        .blue-button {
            background-color: #1a73e8;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .blue-button:hover {
            background-color: #1b66c9;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
        }

        /* Dark mode support - just like Chrome */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #202124;
                color: #e8eaed;
            }
            h1 {
                color: #e8eaed;
            }
            p {
                color: #9aa0a6;
            }
            .error-code {
                color: #9aa0a6;
            }
            .blue-button {
                background-color: #8ab4f8;
                color: #202124;
            }
            .blue-button:hover {
                background-color: #aecbfa;
            }
        }
    </style>
</head>
<body>

    <div class="interstitial-wrapper">
        <!-- Chrome's Sad Document SVG Icon -->
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="56" height="56">
                <!-- Document body -->
                <path d="M12 4C9.8 4 8 5.8 8 8V40C8 42.2 9.8 44 12 44H36C38.2 44 40 42.2 40 40V16L28 4H12Z" fill="#F1F3F4" stroke="#DADCE0" stroke-width="2"/>
                <!-- Folded corner -->
                <path d="M28 4V16H40" fill="none" stroke="#DADCE0" stroke-width="2" stroke-linejoin="round"/>
                <!-- Eyes -->
                <circle cx="19" cy="25" r="2" fill="#80868B"/>
                <circle cx="29" cy="25" r="2" fill="#80868B"/>
                <!-- Sad mouth -->
                <path d="M19 33C19 33 22 29 24 29C26 29 29 33 29 33" fill="none" stroke="#80868B" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>

        <h1>This page can't be found</h1>
        
        <p>The webpage you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        
        <div class="error-code">HTTP_ERROR_404_NOT_FOUND</div>
        
        <div class="button-container">
            <a href="/" class="blue-button">Go back</a>
        </div>
    </div>

</body>
</html>
